defaults:
  - dataset: omomo
  - guidance:
      - pelvis
  - model:
      - infbagel
  - sampler:
      - pelvis
  - _self_

exp_name: infbagel_cm
sample_type: consistency
train: true
load_state_dict: true
batch_size: 512
lr: 0.0001
epochs: 201
device: cuda:0
use_tensorboard: true
ckpt_interval: 20
exp_dir: ${oc.env:ROOT_DIR}/results/${exp_name}

w: 1

num_gpus: 4
num_workers: 2
scene_type: occ_temp
max_window_size: 16
vis: false
start_type: stand

load_language: true
load_scene: true
use_pi: true
load_scene_goal: true
load_pelvis_goal: true
load_object_goal: true

use_random_frame_bps: true
use_object_keypoints: true
add_object_voxel: true

loss_w_obj_pts: 0.5
loss_w_fk: 1
auto_regre_num: 2

temp_voxel_num: 3

start_epoch: 0
ckpt_path: ""

hydra:
  run:
    dir: ${exp_dir}