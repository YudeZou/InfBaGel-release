# InfBaGel mix training config (consistency-model distillation): continues training from the diffusion version's output
defaults:
  - dataset: mix
  - guidance:
      - pelvis
  - model:
      - infbagel_mix
  - sampler:
      - pelvis_mix
  - _self_


exp_name: infbagel_mix_cm
lingo_scene_num: 45     # LINGO scene fraction: 50% (~45 scenes)
lingo_data_ratio: 0.5      # LINGO data fraction: 50% relative to CHOIS
empty_chois_scene: false   # keep CHOIS scenes
epochs: 201
ckpt_interval: 20          # save a checkpoint every 20 epochs
lingo_only: false

random_seed: 42           # fixed random seed for reproducibility

train: true
load_state_dict: true
batch_size: 512
lr: 0.0001
device: cuda:0
use_tensorboard: true
exp_dir: ${oc.env:ROOT_DIR}/results/${exp_name}
smpl_dir: ${oc.env:ROOT_DIR}/smpl_models

w: 0

num_gpus: 4
num_workers: 2
scene_type: occ_temp
max_window_size: 16
motion_len: 100000
vis: false
start_type: stand

load_language: true
load_scene: true
use_pi: true
load_hand_goal: true
load_pelvis_goal: true
load_object_goal: true

human_only_ratio: 0.4

temp_voxel_num: 3
is_o0: false # whether to use o0

use_random_frame_bps: true
use_object_keypoints: true
add_object_voxel: true

loss_w_vel: 0

loss_w_obj_pts: 0.5
loss_w_fk: 1
auto_regre_num: 2

start_epoch: 0
ckpt_path: "/cpfs04/shared/sport/zouyude/code/lingo-release/results/infbagel_mix/checkpoints/infbagel_mix_epoch480.pth"

hydra:
  run:
    dir: ${exp_dir}
